name: Deploy Next.js to S3 and CloudFront

on:
push:
branches:
  - main # Change this if your primary branch is named 'master'

jobs:
build-and-deploy:
runs-on: ubuntu-latest

steps:
  # STREAMING_CHUNK:Checking out code and setting up Node...
  - name: Checkout Code
    uses: actions/checkout@v7

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: latest

  # STREAMING_CHUNK:Installing dependencies and building the static site...
  - name: Install Dependencies
    run: bun install --frozen-lockfile

  - name: Build Project
    run: bun run build

  # STREAMING_CHUNK:Authenticating with AWS and syncing files to S3...
  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v6
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.AWS_REGION }}

  # The --delete flag removes old files from S3 that are no longer in your code
  - name: Sync files to S3 Bucket
    run: aws s3 sync ./out s3://${{ secrets.S3_BUCKET_NAME }} --delete

  # STREAMING_CHUNK:Invalidating CloudFront cache to serve the latest version...
  - name: Invalidate CloudFront Cache
    run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
